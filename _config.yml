title: "Budżet Domowy"
name: "Budżet Domowy"
description: "Praktyczne porady o zarządzaniu budżetem domowym, oszczędzaniu i finansach rodzinnych."
url: "https://solarfinance.pl"
baseurl: ""
lang: pl

remote_theme: mmistakes/minimal-mistakes@4.24.0
minimal_mistakes_skin: "contrast"

timezone: Europe/Warsaw

author:
  name: "Redakcja Budżet Domowy"
  bio: "Pomagamy Polakom mądrze zarządzać domowym budżetem."
  location: "Polska"

plugins:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag

paginate: 8
paginate_path: /page:num/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

permalink: /:year/:month/:day/:title/

exclude:
  - "*.gem"
  - "*.gemspec"
  - Gemfile.lock
  - vendor/
